<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Jeopardy{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">JEOPARDY!</a>
    <div class="nav-links">
      <a href="{{ url_for('admin', board_id='board1') }}">Edit Board 1</a>
      <a href="{{ url_for('admin', board_id='board2') }}">Edit Board 2</a>
      <a href="{{ url_for('game', board_id='board1') }}">Play Board 1</a>
      <a href="{{ url_for('game', board_id='board2') }}">Play Board 2</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
